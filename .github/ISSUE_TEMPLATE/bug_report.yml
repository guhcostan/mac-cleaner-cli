name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: input
    id: version
    attributes:
      label: Mac Cleaner CLI version
      description: Run `mac-cleaner-cli -V` or `npx mac-cleaner-cli -V`
      placeholder: "e.g. 1.3.1"
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      description: "Found in: Apple menu > About This Mac"
      placeholder: "e.g. macOS Sequoia 15.2"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Run `node -v`
      placeholder: "e.g. v22.4.0"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npx mac-cleaner-cli ...`
        2. Select ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste any error messages or terminal output here.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this hasn't been reported before
          required: true
        - label: I'm using the latest version
          required: false
