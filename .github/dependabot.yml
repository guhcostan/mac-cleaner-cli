version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        patterns:
          - "@types/*"
          - "@eslint/*"
          - "eslint*"
          - "typescript*"
          - "vitest*"
          - "@vitest/*"
          - "tsdown"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
